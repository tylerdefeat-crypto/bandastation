  - balance: Плавильная и перерабатывающая машины теперь производят меньше очков за
      единицу, но количество перерабатываемых очков теперь лучше масштабируется к
      количеству обработанных материалов. На 50% больше руды означает на 50% больше
      очков.
  - balance: Количество очков, генерируемых за руду в составе валунов, теперь является
      отдельной переменной, а не процентом от базового значения. Некоторые виды руды
      теперь лучше/хуже генерируют очки за добычу.
  - balance: 'За завершение защиты волны добавляется на 200 очков больше для всех
      уровней рудоносных выходов: 700/1200/1700 для маленьких/средних/больших.'
  - rscadd: Теперь можно нажать Ctrl на камеру, чтобы установить режим печати черно-белых
      фотографий. Камера детектива теперь по умолчанию настроена на этот режим.
  - qol: Фотографии без надписи больше не будут иметь пустое белое пространство в
      нижней части.
  - bugfix: Исправлены ошибки, связанные с CSS, в BYOND версии 516.1681+.
  - bugfix: Эффект Looming снова работает.
  - bugfix: Шкалы стамины больше не показывают перевернутое значение.
  - refactor: Бипски и ED-209 были переработаны.
  - rscadd: ED-209 теперь могут носить кепки! Некоторые виды кепок дают им новые реплики.
  - rscadd: ED-209, подвергшиеся взлому (emag), теперь могут быть использованы в качестве
