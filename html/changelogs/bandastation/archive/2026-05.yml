  - rscadd: Добавлены злые версии ED-209 в магазинных связках Синдиката.
  - sound: Пожарные тревожные сигналы больше не стереофайлы, преобразуемые в моно
      на этапе выполнения.
  - rscdel: Удалено время станции; теперь используется NST (стандартное время Нанотрейзен)
      — реальное время на сервере +544 года, и PT (оплачиваемое время) — время с начала
      раунда.
  - rscdel: Работа в ночную смену на станции теперь является событием станции вместо
      привязки к времени сервера.
  - balance: Программа проверки времени работы теперь будет получать значение заданных
      входных данных (час, минута, секунда) вместо полного перевода времени.
  - qol: Добавлена настройка 12-часового формата для тех, кто предпочитает его.
  - bugfix: Мобы и объекты больше не должны появляться в стенах в определенных биомах.
  - bugfix: Экран отображения плазмы пришельцев снова работает.
  - qol: Глагол Pray теперь назначен горячей клавишей, Whisper теперь является кнопкой
      панели команд, и все команды say были удалены из стат панели.
  - qol: Молитва возможна через меню ESC в административной секции.
  - bugfix: Изменение размера панели характеристик больше не изменяет размер панели
      команд.
  - bugfix: Небольшие правки карты Лаваланда.
  - bugfix: Бомба паука-ниндзя больше не может быть размещена в определенных ситуациях,
      когда ее невозможно было бы взорвать.
  - bugfix: Маска медведя в виртуальном пиццерийном домене теперь является обычной,
      не проклятой маской.
