  - balance: Приветствие Уоррена Кинга теперь является знанием еретика уровня 1, но
      может быть выбрано случайно.
  - balance: Приветствие Уоррена Кинга было слегка переработано. Теперь требуется
      10 кабелей, 1 лист бумаги, 1 мультитул. Теперь добавляет доступ ко всем ID-картам
