  - bugfix: Исправлены проблемы, возникающие при подборе двух предметов, связанных
      наручниками с двумя разными людьми.
  - bugfix: Исправлены проблемы, возникающие при переходе между уровнями с предметом,
      связанным наручниками.
  - admin: Смена музыки в лобби теперь обновляется для всех в лобби.
  - code_imp: Ядерное подкрепление теперь будет опрашивать пользователей с включённой
      преференцией mid-round nuke op, а не в начале раунда.
  - qol: Маяк сингулярности притягивает сингулярности, даже если они были созданы
      после активации маяка.
  - bugfix: Правая кнопка по заброшенному контейнеру с мультитулом больше не может
      привести к взрыву.
  - bugfix: Печенье, которое можно запечатывать, теперь можно запечатывать только
      один раз.
  - rscadd: Большие манипуляторы теперь используют один основной цикл задач, вместо
      двух отдельных циклов точек.
  - bugfix: При прикреплении другой головы к телу Aura Heretic аура не активируется.
  - bugfix: Исправлена ошибка, при которой боты пытались заносить в чёрный список
      удалённые атомы (qdeleted atoms).
