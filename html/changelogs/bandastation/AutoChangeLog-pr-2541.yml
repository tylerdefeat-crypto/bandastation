author: "tgstation"
delete-after: True
changes:
  - bugfix: "Исправлена проблема, при которой глагол Stop-All-Active-Weather не удалял звуки пепельной бури"
  - refactor: "Дождь и пепельные бури были переработаны с использованием частиц вместо оверлеев"
  - bugfix: "Исправлено неправильное кэширование чата"
  - image: "Вулканические поры стали более заметными"
  - bugfix: "Партеногенез больше не вызывает у ваших материализованных рыб нулевые веса"
  - balance: "Минный вентпоинтер был отрегулирован для более точного отображения расстояния до ближайшего вентиля, теперь он покажет, что вы прибыли, если вы находитесь в пределах 8 тайлов от вентиля вместо 14"
  - code_imp: "Несколько улучшений работы и настраиваемости вентпоинтера на серверной части"
  - sound: "Звук теперь использует евклидово расстояние для затухания"
  - code_imp: "max_range в playsound теперь гарантирует, что звук будет слышен на указанном расстоянии"
  - bugfix: "Исправлена ошибка, при которой болезни не вызывали свои обычные эффекты в некоторых контекстах"
  - bugfix: "Исправлена ошибка, при которой воздушные болезни не распространялись через дыхание в некоторых контекстах"
  - balance: "Блоки резьбы теперь могут быть сделаны из любого материала!"
  - rscadd: "Добавлены искусственные пластиковые растения для декорации"
  - rscadd: "RDD: Rapid Decoration Device теперь доступно для сервисного отдела"
  - bugfix: "Иконка BYOND-члена вне игрового чата теперь лучше выровнена с текстом"
  - balance: "Кровавые черви больше не полностью устойчивы к экстремальному давлению и холоду, таким как вакуум космоса"
  - rscadd: "Объекты с древковыми рукоятками, такие как швабры, метлы, посохи, серпы и копья, теперь можно держать в руке как средства передвижения, что снижает хромоту при переломах и уменьшает замедление от отсутствия ноги"
  - balance: "Средства передвижения должны находиться в руке с той же стороны, что и повреждённая или отсутствующая нога для поддержки, и теряют эффективность при двуручном использовании"
  - balance: "Объекты со средствами передвижения уменьшают замедление из-за отсутствия конечностей на 40%, тогда как специализированные медицинские костыли уменьшают его на 60%"
  - refactor: "Рефакторинг логики тростей и костылей в модульный компонент средства передвижения"
  - bugfix: "Исправлено поведение Big Manipulator, включая его работу в строгом режиме, вложение предметов в себя и неправильный выбор целей из-за неверно настроенных фильтров"
  - rscadd: "В игру добавлены тактические карты!"
  - rscadd: "Импланты ядерных оперативников теперь дают возможность открыть Миникарту, которая отображает названия разных зон станции и позиции команды Нюкоперативов, боргов, мехов, Кейенны и ядерного диска в реальном времени"
  - rscadd: "Лидеры Нюков и агенты OW также могут рисовать и добавлять метки на карту"
  - rscadd: "В базу Нюков добавлена «Платформа Разведки», позволяющая отображать тактические карты на уровне Z базы Синдиката"
  - map: "Комната инструктажа на базе НюкОперативов была перепланирована для лучшего размещения нового Голографического стола"
  - map: "Передние ставни на Синдикатовском Инфильтраторе заменены на более подходящие Ставни Синдиката"
  - qol: "Техвеб РНД теперь показывает, где можно напечатать дизайн и сколько это будет стоить"
  - rscadd: "Добавлены упаковки говяжьего рамена как редкий спавн в обслуживании"
  - balance: "Теперь вы можете ходить, поедая практически любые перекусы из автоматов, а не только чипсы и несколько других"
  - spellcheck: "Модуль сферы теперь уточняет, что модкостюм должен быть изолирован кожей желчеглота для безопасного передвижения по лаве"
  - spellcheck: "Исправлено множественное число микроракет в описании модуля сферы: micromissle → micromissiles"
  - balance: "Здоровье щупалец уменьшено, время перезарядки атак, задержки и длительность предсказаний увеличены. Урон некоторых атак немного увеличен (на 5), но теперь они не могут наносить множественные удары"
  - bugfix: "Шипы щупалец теперь правильно анимируются"
  - image: "Выстрелы щупалец теперь имеют эффект сложения обратно"
  - balance: "Бейсбольные биты наносят больше урона и теперь помещаются в слот на спине"
  - bugfix: "Подносы теперь могут правильно выгружать восемь предметов на грилях"