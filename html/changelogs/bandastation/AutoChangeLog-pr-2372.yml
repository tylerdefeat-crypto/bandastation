author: "tgstation"
delete-after: True
changes:
  - refactor: "Объекты поездов переведены на использование item_interaction/tool_act."
  - refactor: "Автосурджены, роботизированные части тела и записи о вскрытиях переведены на использование item_interaction."
  - refactor: "Кроссбриды, анамокоры и механизмы НИОКР переведены на использование item_interaction."
  - bugfix: "Больше никакой бесконечной выдачи гранатомётов для ядерных оперативников."
  - qol: "Если ваша зарплата была сокращена Центральным Командованием, это будет отмечено в журнале аудита и транзакций."
  - qol: "Вас всегда будут уведомлять о сокращении зарплаты, независимо от предпочтений уведомлений банка."
  - admin: "Функция Dock Pay smite теперь лучше поддерживает отрицательные значения (что упрощает процесс передачи денег)."
  - bugfix: "Исправлены ошибки выполнения (runtime), возникающие при привязке простых мобов к операционным столам."
  - bugfix: "Состояние free_operation теперь применяется к животным, когда их привязывают к операционным столам."
  - bugfix: "Это также исправило ошибку, из-за которой мониторы жизненных показателей всегда отображали здоровье простого моба при попытке привязать его к операционному столу."
  - qol: "Требование доступа для двигателя шаттла изменено с доступа СЕ на инженерный доступ."
  - qol: "Двигатель шаттла теперь поставляется в виде плоской коробки (мультитул в комплект не входит)."
  - rscadd: "Добавлена функция `balloon_alert_to_hearers`, аналогичная `balloon_alert_to_viewers`, но для звуковых событий."
  - qol: "Существующие случаи использования `balloon_alert_to_viewers` для звуков теперь используют `balloon_alert_to_hearers`."
  - code_imp: "Исправлен runtime, возникающий, если что-то, кроме игрока, ломает воздушный шлюз."
  - code_imp: "Добавлен макрос юнит-теста для многократного выполнения одного и того же теста."
  - bugfix: "Газовый компрессор снова может выполнять операции с дисками."
  - qol: "Снаряды из \"Watcher Hatchling\" больше не будут попадать в людей, привязанных к вам, или в любой объект, к которому вы привязаны, например, к раптору."
  - bugfix: "Исправлено приложение для заказов грузов (на ПДА и модульных компьютерах), которое не позволяло заказывать некоторые вещи."
  - bugfix: "Ядра аномалий типа Flux и Gravity теперь совместимы с активацией сборок."
  - rscadd: "Торговцы интеллектом (из события) имеют 50% шанс отказать пользователям, которые не являются богатыми. А когда они пробуждаются и начинают двигаться, эта вероятность повышается до 100%."
  - qol: "В приложении RaptorDex ПДА и отдельном сканере RaptorDex добавлены подсказки для сканирования рапторов."
  - bugfix: "Исправлено отсутствие уведомления в виде \"баллона\" о сканировании раптора при использовании ручного RaptorDex."
  - image: "Иконка базового claymore добавлена для ношеного церемониального claymore."
  - bugfix: "Производственные паутины пауков больше не причиняют вред их создателю."
  - rscadd: "Реликвии, найденные при разбивании валунов, теперь имеют (в основном) уникальные эффекты, связанные с добычей и культом."
  - rscadd: "Реликвии, найденные в подарочных коробках, больше не нужно сначала исследовать в научных лабораториях."
  - rscdel: "Операция \"Добавить протезированную конечность\" в хирургии возвращена к более старому формату — теперь проводится операция именно на отсутствующей конечности или её остатках, а не на груди."
  - refactor: "Отсутствующие конечности теперь представлены в виде их остатков. На практике это пока ни на что не влияет, кроме хирургии. Пожалуйста, сообщайте о любых странностях, связанных с отсутствующими конечностями."
  - rscadd: "Добавлена возможность отображения космического параллакса с использованием старых спрайтов космоса (тех, что были до введения параллакса). Анимация считается достаточно красивой."
  - bugfix: "Работа космического параллакса теперь должна быть более стабильной."
  - refactor: "Переработан механизм управления космическим параллаксом. Сообщайте о любых обнаруженных ошибках!"
  - rscadd: "Обновлён процесс отображения искр. Они стали чуть ярче, постепенно исчезают при движении или столкновении, меньше наслаиваются друг на друга и не зависают в воздухе при появлении."
  - rscadd: "Добавлен эффект мерцания для зажигалок, сварочных инструментов, ракетниц, факелов и свечей (так как это огонь)."
  - bugfix: "Осветительные эффекты (например, фонарики) больше не удваивают свою яркость при взятии в руки."
  - refactor: "Обновлён механизм работы некоторых эффектов (частицы взрывов, искры, эффекты реагентов). Пожалуйста, сообщайте о любых ошибках!"
  - bugfix: "Разборка/демонтаж плитки пола или армированных плиток больше не разрушает установленные на них светильники/раковины, если под покрытием есть основа."
  - balance: "Посох Бури теперь имеет нормальный размер и помещается в рюкзак."
  - bugfix: "БСА (Bluespace Artillery) больше нельзя построить с частичным захождением на стену."
  - qol: "При строительстве ДНК-хранилища или БСА отображаются плитки, мешающие конструкции."
  - image: "Для общих хирургических операций добавлены уникальные иконки в радиальном меню."
  - qol: "Аудит журнал теперь форматирует названия без артикля \"the\"."
  - bugfix: "Пыль обезьян теперь корректно удаляет антистан-эффекты, когда её употребляющий больше не является обезьяной."
  - spellcheck: "Убрано лишнее пространство при распылении краски на атмос-машины."
  - spellcheck: "Толкание одного человека в другого больше не отправляет сообщение \"вы толкнули\" тому, в кого толкнули."
  - admin: "Флаги подсистем теперь отображаются в формате флагов вместо чисел в vv."
  - rscadd: "Добавлен Thanatorenasia — нейтральная причуда за 0 очков, которая превращает ваше тело в статус \"спасённого члена экипажа\", если вы выбираете DNR (не возрождать). После возрождения любой призрак может взять его под контроль."
  - refactor: "Переработано поведение \"контроля-призрака при возрождении\". Сообщайте о любых странностях/проблемах с ним или меню спаунера."
  - balance: "HP синих рапторов увеличено с 220 до 300."
  - balance: "Фиолетовые рапторы автоматически начинают летать, если их владелец собирается упасть в пропасть."
  - bugfix: "Исправлены две уязвимости, которые позволяли избежать падения в определённую пропасть."
  - qol: "Больше мест вызывает событие настроения \"заляпан кровью\"."