author: "tgstation"
delete-after: True
changes:
  - balance: "Цена шахтерской крюк-кошки снижена до 1500 очков."
  - bugfix: "Исправлена проблема, из-за которой цыплята-рапторы и другие не-предметы в содержимом предметов блокировали персональный крафт поблизости."
  - rscadd: "Персонажи, получившие состояние \"nograv\" на планете, получают положительный эффект настроения и считаются находящимися в космосе с точки зрения их положительных или отрицательных эффектов."
  - bugfix: "Добавлены дополнительные меры предосторожности к администраторскому инструменту \"Создать предмет черного рынка\"."
  - bugfix: "Разделка головы более не перемещает органы в \"нулевое пространство\", вероятно, то же самое касается любых других методов массового удаления органов."
  - admin: "Дебаггер Planemaster теперь имеет текстовый ввод для поиска и перехода к плоскостям."
  - admin: "Добавлен переключатель режима метеоров в секретах."
  - code_imp: "makeHologram теперь позволяет переопределить цвет."
  - bugfix: "Плазма снова работает в импровизированных взрывных устройствах (IED)."
  - qol: "Пользовательский интерфейс галактического рынка теперь может отображать минимальный и максимальный ценовые диапазоны, по которым материал будет продаваться."
  - qol: "Теперь можно продавать материалы на границе их порогов покупки и продажи (на практике это касается железа и стекла)."
  - balance: "Количество кровопотери от удара в уже кровоточащую рану было скорректировано. Например, удар силой 20 раньше вызывал от 0.1% до 4% кровопотери, теперь диапазон составляет от 1% до 3%."
  - map: "Добавлена обувная фабрика к лавовым/ледяным руинам."
  - bugfix: "Свет больше не виден сквозь стены при использовании мезонов или ползке через вентиляцию."
  - balance: "Кодекс Цикатрикс теперь является знанием еретика уровня 1 и не может быть выбран случайным образом."
  - balance: "Приветствие Уоррена Кинга теперь является знанием еретика уровня 1, но может быть выбрано случайно."
  - balance: "Приветствие Уоррена Кинга было слегка переработано. Теперь требуется 10 кабелей, 1 лист бумаги, 1 мультитул. Теперь добавляет доступ ко всем ID-картам поблизости, включая надетые карты. Теперь добавляет доступ \"heretic\" к ID-карте. Переключает все близлежащие шлюзы на требование доступа \"heretic\" и разрезает провод ИИ."
  - balance: "Эльдрический ID теперь начинается с доступа \"heretic\"."
  - rscadd: "Некоторые шлемы EVA теперь имеют убирающиеся защитные козырьки, которые можно поднять или опустить, чтобы раскрыть лицо."
  - bugfix: "Рецепты metalgen и secret sauce теперь загружаются корректно."
  - bugfix: "Миска для грибов больше не становится невидимой при заполнении реагентом."
  - bugfix: "Эксклюзивные наборы для экспресс-консоли (например, ракета с крабами) теперь могут быть заказаны через такие консоли."
  - balance: "Мутации, полученные от большинства источников случайных мутаций, теперь можно сохранять в консолях ДНК."
  - rscadd: "Плавильная и перерабатывающая машины для валунов теперь могут принимать входящие компоненты от систем водопровода (подробнее в examine) для увеличения выхода полезных материалов из обработанных валунов."
  - rscadd: "Перерабатывающие машины для валунов теперь производят новый химический элемент — промышленные отходы, которые нужно утилизировать; иначе при накоплении в одном контейнере они начнут переливаться."
  - balance: "Плавильная и перерабатывающая машины теперь производят меньше очков за единицу, но количество перерабатываемых очков теперь лучше масштабируется к количеству обработанных материалов. На 50% больше руды означает на 50% больше очков."
  - balance: "Количество очков, генерируемых за руду в составе валунов, теперь является отдельной переменной, а не процентом от базового значения. Некоторые виды руды теперь лучше/хуже генерируют очки за добычу."
  - balance: "За завершение защиты волны добавляется на 200 очков больше для всех уровней рудоносных выходов: 700/1200/1700 для маленьких/средних/больших."
  - rscadd: "Теперь можно нажать Ctrl на камеру, чтобы установить режим печати черно-белых фотографий. Камера детектива теперь по умолчанию настроена на этот режим."
  - qol: "Фотографии без надписи больше не будут иметь пустое белое пространство в нижней части."
  - bugfix: "Исправлены ошибки, связанные с CSS, в BYOND версии 516.1681+."
  - bugfix: "Эффект Looming снова работает."
  - bugfix: "Шкалы стамины больше не показывают перевернутое значение."
  - refactor: "Бипски и ED-209 были переработаны."
  - rscadd: "ED-209 теперь могут носить кепки! Некоторые виды кепок дают им новые реплики."
  - rscadd: "ED-209, подвергшиеся взлому (emag), теперь могут быть использованы в качестве средства езды."
  - rscadd: "Добавлены злые версии ED-209 в магазинных связках Синдиката."
  - sound: "Пожарные тревожные сигналы больше не стереофайлы, преобразуемые в моно на этапе выполнения."
  - rscdel: "Удалено время станции; теперь используется NST (стандартное время Нанотрейзен) — реальное время на сервере +544 года, и PT (оплачиваемое время) — время с начала раунда."
  - rscdel: "Работа в ночную смену на станции теперь является событием станции вместо привязки к времени сервера."
  - balance: "Программа проверки времени работы теперь будет получать значение заданных входных данных (час, минута, секунда) вместо полного перевода времени."
  - qol: "Добавлена настройка 12-часового формата для тех, кто предпочитает его."
  - bugfix: "Мобы и объекты больше не должны появляться в стенах в определенных биомах."
  - bugfix: "Экран отображения плазмы пришельцев снова работает."
  - qol: "Глагол Pray теперь назначен горячей клавишей, Whisper теперь является кнопкой панели команд, и все команды say были удалены из стат панели."
  - qol: "Молитва возможна через меню ESC в административной секции."
  - bugfix: "Изменение размера панели характеристик больше не изменяет размер панели команд."
  - bugfix: "Небольшие правки карты Лаваланда."
  - bugfix: "Бомба паука-ниндзя больше не может быть размещена в определенных ситуациях, когда ее невозможно было бы взорвать."
  - bugfix: "Маска медведя в виртуальном пиццерийном домене теперь является обычной, не проклятой маской."