  - bugfix: "Теперь крематорий не выдает после уничтожения 5 единиц металла и не пропадает из игры."
  - image: "Добавлен спрайт для сломанного крематория."
  - map: "Cyberiad: В комнате хранения плат добавлены платы контроллеров и кнопки для крематория."