author: "tgstation"
delete-after: True
changes:
  - bugfix: "Модуль скрытности Wraith для предателя теперь снова активируется после истечения необходимого времени."
  - bugfix: "Исправлена проблема с застреванием предметов инвентаря на экранах призраков."
  - qol: "Сканированные раны остаются отсканированными во время лечения."
  - bugfix: "Призрак при обладании Poly теперь излучает фиолетовую ауру, как и должно быть."
  - bugfix: "Случайная медленная плитка на карте Icebox perma была удалена."
  - bugfix: "Исправлено игнорирование отрицательных эффектов кровопотери при статусе \"решимость\"."
  - bugfix: "Галлюцинация \"твоя мать\" для плазмаменов теперь показывает настоящую мать плазмамена."
  - bugfix: "Внутренние органы больше не вызывают ненужных обновлений в предварительном просмотре персонажа."
  - bugfix: "ИИ теперь должны корректно получать доступ к консолям запросов."
  - sound: "Исправлен звук удара суплексом с прутами."
  - bugfix: "CQC больше не может красть мисты backtank и другие привязанные предметы."
  - qol: "Добавлено больше описательного текста к клапанам переноса топлива для лучшего понимания их функционала."
  - qol: "При клике на резервуар с клапаном переноса топлива теперь происходит его прямое подключение."
  - bugfix: "pAI теперь могут использовать свои инструменты."
  - bugfix: "Исправлена ошибка при попытке использования приложения груза с карточкой без профессии."
  - bugfix: "Исправлено случайное появление шрамированного глаза без соответствующего признака."
  - balance: "Заклинание \"исцеляющее прикосновение\" теперь частично лечит конечности."
  - balance: "\"Исцеляющее прикосновение\" больше не всегда переносит критические раны при усилении."
  - bugfix: "Ограничение кровопотери при использовании \"исцеляющего прикосновения\" теперь работает корректно."
  - code_imp: "Удалена избыточная проверка из заклинания \"исцеляющее прикосновение\"."
  - spellcheck: "Текст при потере эффекта \"исцеляющего прикосновения\" переформулирован для ясности и теперь не предполагает, что у вас только одна рука."
  - rscdel: "Вкладка \"IC\" в панели статистики удалена."
  - bugfix: "Лайтгейсты больше не могут выражать эмоции или тянуть предметы, как это предполагалось."
  - bugfix: "Миньоны Блоба снова не могут тянуть предметы."
  - qol: "Пользователи боевых искусств теперь имеют кнопку действия для взаимодействия с их стилем боя, вместо панели статистики."
  - qol: "Теперь можно правым кликом по кнопкам перемещения вверх/вниз смотреть в нужном направлении без перемещения."
  - rscadd: "У капитана теперь есть бинокль и соответствующая одежда..."
  - spellcheck: "Некоторые упоминания мантии флагелланта культиста удалены."
  - bugfix: "Интерфейс панели голосования приведён в порядок."
  - bugfix: "Панель голосования теперь не закрывается для администратора, который отменяет голосование."
  - code_imp: "Событие \"отключение питания\" теперь вызывает меньше лагов."
  - bugfix: "Исправлена ошибка с отображением времени в АПЦ во время события \"отключение питания\". Ранее время отображалось вдвое меньшее, теперь таймер может показывать до 4 минут, хотя длительность события не изменилась."
  - bugfix: "Исправлено удвоенное время действия эффекта саботажа на АПЦ — схожая проблема с вышеупомянутой ошибкой АПЦ."
  - rscadd: "Кровь Подперсон (Podpeople) теперь можно восстанавливать с помощью E-Z Nutrient, которая работает подобно железным таблеткам для людей."
  - rscadd: "Питательные вещества для растений (Liquid Earthsquake, Robust Harvest, E-Z Nutrient, Left 4 Zed, Enduro Grow) теперь лечат токсическое повреждение у существ с биотипом MOB_PLANT."
  - bugfix: "Исправлена проблема с переменой ноги при хромоте при использовании трости."
  - rscadd: "Уборщики теперь стреляют точно при броске предметов в мусороприёмники."
  - balance: "Рудокопы теперь в приоритете выбирают людей, а не обычных мобов, за исключением красных и чёрных рапторов — их приоритет выше, чем у людей."
  - rscadd: "Добавлен новый элемент для индикаторов урона в стиле Runescape."
  - rscadd: "В шкафчик Квартирмейстера добавлен световой индикатор."
  - spellcheck: "Пища максимального качества теперь называется \"Божественная\" вместо \"Богоподобной\"."
  - rscadd: "Орган сердце теперь контролирует скорость регенерации кровотока у существа. Состояние сердца также влияет на эту скорость — при получении повреждений сердце перекачивает кровь медленнее."
  - qol: "Поддержка у голопаразитов добавлена возможность телепортировать объекты между двумя уровнями станции."
  - bugfix: "Телепортация у голопаразитов больше не вызывает ошибки при попытке телепортировать тайл."
  - bugfix: "Стартовые переработчики и плавильные печи валунов теперь ориентированы в правильном направлении."
  - bugfix: "Битраннеры больше не получают двойной урон внутри домена, при этом урон по их настоящим телам сохраняется."
  - balance: "Для каждого живого, подключённого битраннера в домене баги при битраннинге будут уходить в пять раз дольше."
  - bugfix: "Нельзя больше заблокировать виртуальный домен, использующий очки, взломом тайла награды до появления ящика."
  - bugfix: "исправлена пропажа иконки Gene Stim в интерфейсе лингвиста."
  - qol: "Отладочные блюспейс-реплики теперь оснащаются соответствующим уровнем мегаклеток."
  - rscadd: "Добавлена плата автолата как один из покупаемых товаров на рынке карго."
  - balance: "В вентиляционных шахтах, не являющихся боссовыми, теперь не появляются блюспейс-кристаллы и алмазы."
  - balance: "У всех вентиляционных шахт теперь фиксированная 7% вероятность появления артефактного валуна."
  - balance: "Добавлено два новых типа артефактных валунов, которые могут содержать от 1 до 5 листов блюспейс-кристаллов или алмазов соответственно. Эти валуны могут улучшаться химическим усилением редкой руды."
  - balance: "Распределение руды в вентиляционных шахтах было скорректировано, чтобы учесть удаление блюспейс-кристаллов и алмазов."
  - spellcheck: "Теперь при осмотре вентиляционной шахты объясняется механика артефактного валуна."
  - bugfix: "Патрульные контракты корректно оплачиваются тем, кто их выполняет."
  - refactor: "Переработаны ДНК-инъекторы (как изменяющие внешний вид, так и активирующие мутации). Сообщайте о любых ошибках, например, если внешний вид не восстанавливается или мутации не применяются корректно."
  - code_imp: "Незначительно изменён тайминг заболеваний, сообщайте о любых аномалиях."
  - code_imp: "Незначительно изменён тайминг механик некоторых видов, таких как големы и слаймы, сообщайте о любых аномалиях."
  - code_imp: "Изменён код печати ДНК-инъекторов, изменяющих внешний вид, в генетике — сообщайте о любых ошибках."
  - code_imp: "Незначительно изменён бэкенд-код, связанный с трансформационными колющими эффектами, сообщайте о любых ошибках."
  - code_imp: "Зомби \"бормочет в состоянии покоя\" теперь связано с языком, а не с видом."
  - admin: "Принудительная инъекция HARS теперь вызывает админ-уведомление, как и принудительная инъекция Monkey."
  - bugfix: "Несколько методов копирования ДНК (включая трансформационный укус) ошибочно копировали \"активные мутации\", теперь исправлено."
  - bugfix: "Хонкбот на аварийном шаттле казино получил команду не покидать свой пост."