author: "tgstation"
delete-after: True
changes:
  - refactor: "Код реакции реагентов переработан для повышения производительности процессора и памяти. Сообщайте о сломанных реакциях на GitHub."
  - balance: "Красные и чёрные рапторы больше не атакуют своего дрессировщика в ответ на случайные удары."
  - balance: "Скорость роста рапторов и детёнышей/яиц рапторов увеличена на 50% и 33% соответственно."
  - bugfix: "Исправлено смещение меню наведения курсора на рапторов, а также другие визуальные проблемы со смещением."
  - admin: "Добавлен секрет для перезапуска генератора гравитации."
  - bugfix: "Операция восстановления дислокации игнорирует одежду."
  - bugfix: "Событие выдачи кредита на шаттл теперь корректно завершает себя, если не принято в пределах установленного времени, позволяя провести другие предложения по кредиту."
  - bugfix: "Мусорные баки шахтёрского отдела и отдела грузчиков на карте Metastations больше не маркированы брендом Джима Нортона."
  - config: "Добавлена опция конфигурации для указания пути к policy.json."
  - rscdel: "Удалены вкладки \"Объект\" и \"Сервер\" для игроков. Глагол \"Активировать удерживаемый объект\" теперь находится на вкладке IC. Действия \"Осмотреть\" и \"Указать на\" убраны из панели статистики."
  - admin: "Глаголы владения объектами перемещены во вкладку \"Админские развлечения\"."
  - qol: "Сборки для отображения здоровья теперь показывают своё состояние в тексте на карте, а не в панели статистики."
  - bugfix: "Исправлено пустое сообщение при извлечении ID-карты из ПДА."
  - bugfix: "Исправлена невозможность выполнения операций киборгами, требующих ввода от пользователя перед началом."
  - refactor: "Переработан SDSM-35 для добавления новых книг похожего стиля — сообщайте о любых странностях, связанных с этим."
  - bugfix: "Исправлены сломанные изображения в книге SDSM-35."
  - rscadd: "Добавлен справочник IDC-27 в Медбей, кабинет СМО, Вирусологию и, возможно, Библиотеку. Это книга-ссылочник обо всех возможных вирусах, аналогичная SDSM-35."
  - rscadd: "Некоторые заболевания и вирусы получили небольшие текстовые дополнения, включая описание лечения, агента, особенности и форм."
  - rscadd: "Лечение от гриппа даёт иммунитет к испанскому гриппу (и наоборот), как указано в тексте лечения."
  - rscadd: "Лечение от простуды даёт иммунитет к Cold-9 (и наоборот), как указано в тексте лечения."
  - bugfix: "Добавлены проверки для кнопок действий; теперь больше игровых кнопок будут учитывать возможность использования игроком."
  - rscadd: "Медбей и Детективы теперь могут добавлять причину смерти в медицинские записи людей, если они зарегистрированы как умершие."
  - spellcheck: "Большинство подсказок при использовании гаечного ключа теперь корректно написаны с заглавной буквы."
  - bugfix: "Исправлена ошибка, при которой игроки сталкивались со своим собственным верховым животным при совместном броске."
  - bugfix: "Исправлено, что блокировка ударов или успешная защита не предотвращала захват."
  - qol: "Состояния по операции, вызываемые ранениями, не отображаются при осмотре, если моб не подготовлен к операции."
  - qol: "Текст состояния операции при осмотре стал немного меньше."
  - qol: "Операция по \"исправлению костей\" больше не отображается, если у пациента перелом; вместо неё потребуется операция \"ремонт перелома\"."
  - balance: "Святая вода временно приостанавливает некоторые эффекты проклятой картины и помогает обратить их."
  - rscadd: "Добавлен новый класс стилей CSS для использования в конфигурации, чтобы заметить текст политики легче."
  - bugfix: "Лазерный луч RPED на каркасе машины теперь отображается корректно."
  - admin: "Администраторы больше не могут редактировать датумы глобального модификатора скорости движения."
  - code_imp: "Графическая производительность атмосферных труб — теперь области станции с трубами будут менее нагружать клиент."
  - bugfix: "Марля остаётся на кровоточащих ранах, к которым она была применена, но всё равно не останавливает кровотечение."
  - rscdel: "Станция Чарли больше не может печатать кастомные платы для шаттлов."
  - bugfix: "Исправлено отображение Brimdust на широких мобах (таких как рапторы)."
  - bugfix: "Исправлено, что силиконы не могли использовать операционный компьютер на расстоянии."
  - qol: "Добавлен индикатор в настройки подсветки чата, если введён некорректный регулярное выражение (красная рамка вокруг текстового поля)."
  - qol: "Теперь можно включать/выключать отдельные подсветки чата."
  - bugfix: "Реакции больше не потребляют катализаторы."
  - code_imp: "Улучшен код реакции в других местах."
  - bugfix: "Грязная маска, которую можно убрать, больше не ухудшает видимость, если она уже убрана."
  - qol: "Если ваша маска загрязнена перцовым спреем, вы получите пассивные сообщения в чате о возможности её очистки."
  - balance: "Загрязнение одежды перцовым спреем теперь применяется дозированно: небольшие дозы накапливаются при повторном применении, вместо того чтобы вообще ничего не делать."
  - balance: "Загрязнение одежды перцовым спреем теперь имеет промежуточное состояние между \"сильно ухудшенной видимостью\" и \"невозможностью видеть\", давая владельцу возможность заранее заметить предупреждение перед переходом в темноту."
  - balance: "Эффекты слепоты от перцового спрея больше не могут накапливаться бесконечно. Теперь они ограничиваются до 6 секунд, что соответствует другим эффектам спрея (путаница до 5 секунд, размытие до 10 секунд, сбивание с ног до 3 секунд)."
  - admin: "Добавлен глагол \"Перейти к призраку\", который переносит ваше тело к вашему агхосту. У него есть горячая клавиша, по умолчанию F4."
  - bugfix: "Исправлена перманентная кома от инъекции зомби-порошка."
  - spellcheck: "Переименован золотой диск данных в диск данных Синдиката."
  - bugfix: "Исправлены условно добавленные действия, не отображавшиеся на HUD игрока."
  - balance: "Проклятие способности \"Прозрачность\" Волшебника теперь перманентно."
  - bugfix: "Маска карпа снова может использоваться как средство для дыхания."
  - bugfix: "Нейрин снова работает на мёртвых."
  - bugfix: "Исправлен IDC."
  - qol: "Яйцо ксеноморфа, которое появляется в начале раунда, теперь упоминается как часть кругового отчёта, а не как отдельный второй отчёт (это обычно следовало за основным отчетом)."
  - bugfix: "Сейфы на стенах хранилищ спасательных капсул теперь корректно отображают свой статус \"заблокирован/разблокирован\"."
  - rscadd: "Кастомные материалные копья теперь можно создавать, используя осколки или любые кристаллические листы на электропроду."
  - rscadd: "Добавлено 3 новых эффекта материалов: \"Погубитель вампиров\" (серебро), \"Телепортация\" (блюспейс-/телекристаллы) и \"Проникающая способность\" (телекристаллы)."
  - balance: "Механика расчёта характеристик материалов для копий была исправлена с учётом новой системы слотов."
  - refactor: "Реализована датум-ориентированная структура для эффектов материалов и слотов."
  - bugfix: "Улучшения омнитула киборга теперь увеличивают скорость инструментов."
  - bugfix: "Улучшение инженерного омнитула киборга теперь корректно увеличивает скорость сварочного аппарата."
  - bugfix: "Высота мобов ДНК больше не мгновенно возвращается к базовой высоте для всех мобов."
  - bugfix: "Некоторые запросы панели разрешений теперь снова работают."
  - bugfix: "Учебник о смене руки больше не будет показываться тому, кто лишён руки."
  - bugfix: "Удален вводящий в заблуждение запрос ключа для \"Драконьей лодки лавы\"."
  - image: "Толстовки! Доступны модели с капюшоном и на молнии — их можно найти в Clothesmate и лодаутах."
  - bugfix: "Защитные слабые точки теперь имеют больше механизмов безопасности, предотвращающих появление в космосе."
  - image: "Защитные точки теперь появляются с анимацией."
  - bugfix: "Исправлено случайное откатывание прогнозов погоды и ложные предупреждения о безопасности перед началом шторма."
  - rscdel: "Модифицированное ядро цветка плазмы больше не порождает бабочек вокруг пользователя."
  - qol: "Визуальный эффект пыльцы модифицированного ядра цветка плазмы теперь создаёт меньше частиц."
  - spellcheck: "Из-за конфликта с Императрицей Улья Ламар утратил титул дипломатического лицехвата."