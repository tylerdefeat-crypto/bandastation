author: "tgstation"
delete-after: True
changes:
  - spellcheck: "Добавлена проверка орфографических ошибок в разделе безопасности в CI"
  - bugfix: "Блобы больше не могут уничтожать неразрушимые предметы, такие как диск"
  - qol: "Альтернативный костюм шута теперь в оттенках серого и доступен для покупки"
  - bugfix: "Случайные рецепты больше не могут иметь верхнюю границу pH выше 14"
  - bugfix: "Пни теперь непрозрачны"
  - bugfix: "Статические мешки для тел больше не плотные, когда закрыты"
  - spellcheck: "Исправлена опечатка в слове \"cinched\" (застёгнутый) в мешках для тел с пряжками (мешки для заключённых и т.п.)"
  - bugfix: "Прыжок Дрейка больше не вводит в заблуждение, утверждая, что вы падаете в лаву, если не удаётся вызвать лаву"
  - bugfix: "Материальные копья теперь частично не избегают штрафа силы за плохое владение"
  - bugfix: "Исправлен наложение brimdust на широких мобах, которое просачивалось на другие объекты"
  - code_imp: "Ученик волшебника теперь использует предпочтение волшебника в середине раунда, а не с начала раунда"
  - balance: "Скорость выстрелов дизаблера теперь 1.6 вместо 1.25, извините, ошибка в навыках"
  - bugfix: "Исправлена проблема с неограниченной печатью бумаг в магазине NT; теперь она связана с хранилищем бумаги компьютера (ноутбук, ПДА и т.п.)"
  - balance: "Умные холодильники больше не блокируют атмосферу при поломке и не пропускают существ до поломки"
  - bugfix: "Переключение тел лунатиков (включая обмен слизеперсон) больше не даёт дублирование кнопок действий"
  - bugfix: "Путь блокировки теперь учитывает скидку в 1 точку"
  - bugfix: "Скидки от токсинов на бумагах теперь корректно отображаются в исследовательских интерфейсах"
  - refactor: "Рефакторинг исследовательских техвебов: скидки на токсины теперь хранятся на уровне узлов техвеба, а не на уровне всего техвеба"
  - bugfix: "Щупальца больше не пытаются атаковать вас, если вы вне их досягаемости"
  - code_imp: "Упрощён код агрессии персонажа The Thing"
  - bugfix: "Токсичные пчёлы теперь содержат токсин"
  - rscadd: "Добавлены ботанические поддоны – гидропонные поддоны с почвой вместо воды, просто заполните поддон любой почвой и готово!"
  - image: "Перерисован режим авто-роста и добавлены эмиссивы"
  - image: "Перерисованы гидропонные поддоны"
  - rscadd: "Добавлен режим старого дизайна для гидропонных поддонов – используйте отвёртку или анализатор растений на схеме!"
  - image: "Добавлены эмиссивы на индикаторы гидропонных поддонов"
  - balance: "Вместо жёсткого требования к сну лечение cryox повышается вдвое, когда персонаж спит"
  - bugfix: "При стандартных настройках криокапсула с cryoxadone больше не вызывает софтлок из-за того, что наносит урон быстрее, чем лечит"
  - balance: "Белые медведи немного стали быстрее"
  - bugfix: "Трофей хвоста Дрейка больше не толкает неподвижных мобов"
  - qol: "Люди в наручниках/отдыхающие/те, кто не могут тянуть других, не будут получать подсказку о необходимости тянуть в выпадающем меню"
  - refactor: "Реализовано сглаживание наложений лавы и воды в лаваланде"
  - code_imp: "Демоны убоя/смеха теперь используют предпочтение разумного существа, а не ксеноморфа"
  - qol: "Теперь можно просмотреть личность персонажа из окна настроения (щелчок по элементу HUD настроения)"
  - qol: "Добавлено привязка клавиши \"отменить взаимодействие\", по умолчанию не назначена, она отменяет (большинство) выполняемых взаимодействий без необходимости перемещаться или менять предметы"
  - map: "Выбросы катакомб работают корректно"
  - rscadd: "Кроваво-пьяный шахтёр теперь роняет инфернальный PKA с встроенной улучшенной модификацией быстрого повторителя"
  - balance: "Кроваво-пьяный шахтёр переработан с новыми атаками и шаблонами поведения"
  - bugfix: "Комбо кроваво-пьяного шахтёра больше не гарантированно попадают, если отойти от него"
  - sound: "Изменено уменьшение урона — теперь оно менее агрессивное, так как прежнее слишком быстро снижало объём"
  - refactor: "Реализована система пространственного звука для улучшения зацикленных звуков"
  - balance: "Штурмовые киборги Синдиката теперь могут блокировать атаки энергетическими мечами"
  - balance: "Медицинские киборги Синдиката теперь имеют атропин в своём гипоспрое для предотвращения взрыва микробомб"
  - code_imp: "Rust-G обновлён до версии 6.2.0"
  - refactor: "Лаваленд/Ледяная луна теперь используют более умный алгоритм генерации пещер, делающий их более связанными и упрощающий нахождение руин"
  - bugfix: "Разрушение \"wishgranter\" теперь имеет подтайпы /biome_replace для пола/стен, обеспечивая правильное появление (если включено в конфиге)"
  - bugfix: "Пинпоинтеры прекращают слежение за изгнанным ИИ, если ИИ больше не изгнан"
  - bugfix: "Исправлена неработающая опция направления панели спавна TGUI"
  - bugfix: "Исправлено, что мотыльки могли летать в космосе"
  - image: "Добавлен направленный спрайт для гробов"
  - qol: "Теперь у Админ RPED по 40 частей"
  - code_imp: "Теперь у Админского наряда и Debug-награды (что это?) есть AdminDebug RPED с 40 частями, а не просто Tier4 RPED, который схож с игровым предметом"
  - rscadd: "В кулинарную книгу местного шефа добавлены яблочные пончики!"
  - code_imp: "Цепочка атак борга теперь передаёт модификаторы в свой метод `attack_self()`"
  - qol: "Сварщик Omni Tool теперь не включается автоматически при переключении через радиальное меню или кнопку инвентаря. Это предотвращает случайное возгорание в опасных зонах"
  - qol: "Сварщик Omni Tool теперь можно включать/выключать ЛКМ, как обычный сварщик, а не Ctrl+ЛКМ. Используйте ПКМ для открытия радиального меню и переключения на другие инструменты при использовании сварщика"