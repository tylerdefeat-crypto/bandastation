author: "tgstation"
delete-after: True
changes:
  - sound: "Книги теперь издают звук бумаги при открытии"
  - bugfix: "Исправлены аргументы для wound receive damage"
  - bugfix: "Потеря конечностей из-за проклятья теперь оставляет пеньки конечностей (чтобы можно было позже вернуть конечности)"
  - bugfix: "Исправлено лечение в TTX"
  - bugfix: "Кровь при бое по уже существующим ранам теперь разбрызгивается"
  - bugfix: "Исправлен runtime при попытке вытащить черту"
  - bugfix: "Исправлен runtime при попытке улучшить блоба, а также исправлена потеря очков при улучшении отражающего блоба в отражающего блоба"
  - bugfix: "Корги больше не ругаются runtime при попытке открыть дверь без ID"
  - bugfix: "Исправлены debug оверлеи на новых биомных камнях в лаваланде"
  - sound: "Добавлен звук сверла к хирургическому сверлу"
  - sound: "Добавлены звуки кнопок к защищённым сейфам"
  - sound: "Добавлен звук клапана к портативным баллонам"
  - refactor: "Конструкция камер безопасности и взаимодействие с предметами переписаны, сообщайте о любых странностях"
  - bugfix: "Смена вида у большинства обезьян, чьи имена были изменены на имена из манифеста, больше не меняет имена в записях этих лиц на имя, которым обезьяна заканчивает владеть"
  - bugfix: "Исправлены булыжники с алмазами и блюспейс-артефактами, которые не содержали алмазов/кристаллов блюспейса"
  - rscadd: "Добавлен \"Conserved Genetics\" — генетическая черта растения, которая предотвращает изменение нестабильности растения при перекрёстном опылении"
  - sound: "Добавлен звук включения/выключения для выключателей света в помещениях"
  - bugfix: "Исправлены тайлы материалов и стены, которые не имели материала при строительстве из последнего предмета стека"
  - admin: "Молитвы игроков теперь выводятся в отдельном блоке (как сообщения при осмотре и некоторые отчёты о здоровье), что облегчает их отличать от постоянного потока текста в чатах"
  - rscadd: "Санта Клаус теперь слышит молитвы, в которых его или Рождество упоминают. Он не узнает, кто молится, если ему не скажут, но может определить, ведёт ли молящийся себя плохо"
  - rscadd: "Добавлен websocket-клиент, теперь можно пересылать входящие сообщения чата во внешнюю программу, например, для изменения плейлистов музыки в зависимости от событий"
  - spellcheck: "Растения Butterbean теперь корректно с заглавной буквы при посадке"
  - qol: "Мобы слаймов из цитологии теперь имеют такой же HUD, как и другие мобы, показывающий здоровье"
  - qol: "Способности винограда Shoolean теперь имеют в описании указание стоимости"
  - bugfix: "Способность \"mending globule\" у винограда Shoolean больше нельзя использовать при недостаточном питании"
  - refactor: "Переработаны мулеботы, пожалуйста, сообщайте об ошибках"
  - bugfix: "Исправлены сломанные оверлеи участков с погодой в виде частиц"
  - image: "Изменено окрашивание контура регенерации щупальцев с ярко-зелёного на тёмно-красный"
  - rscadd: "Лучевые эффекты теперь анимируются при переходе с тайла на тайл, это особо заметно при постоянных эффектах луча"
  - bugfix: "Эмиссивы лучей теперь работают"
  - code_imp: "Карту шаттлов реорганизованы в отдельные папки"
  - qol: "Теперь можно прослушать, как звучат разные эмоции через панель эмоций."
  - bugfix: "Теперь можно слышать внешние звуки, находясь внутри чего-либо (например, в шкафах, мехах)"