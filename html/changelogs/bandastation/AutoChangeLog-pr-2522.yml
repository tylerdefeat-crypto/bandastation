author: "tgstation"
delete-after: True
changes:
  - qol: "добавлено ночное видение у voidwalker. Почему этого не было раньше??"
  - bugfix: "Исправлены мутагены, распечатываемые из генетики"
  - bugfix: "Королевы Ксеноморфов больше не замедляются своими гигантскими хвостами, поскольку они тоже гигантские"
  - refactor: "Рефактор инвентаря: интерфейс теперь полностью основан на датах и vis_contents"
  - bugfix: "Наблюдатели больше не видят двойные окна инвентаря"
  - rscadd: "Добавлена черта \"хромота\", из-за которой персонаж хромает."
  - balance: "Удалено мгновенное убийство от сверла меха через удаление органа, вместо этого теперь очень высокий шанс тяжелого ранения"
  - bugfix: "модуль хранения теперь корректно вызывает блюспейс-помехи, как и задумано"
  - refactor: "проверки помех телепортера теперь смотрят на флаг предмета, а не жестко проверяют тип сумок хранения"
  - spellcheck: "Безопасность"
  - bugfix: "Переименованы 2 камеры на MetaStation: первая камера имела неправильное имя, вторая — плохое имя"
  - balance: "Битраннеры больше не могут выходить из доменов через лестницу, если в них остались сбои битраннинга"
  - bugfix: "Исправлена постоянная деактивация каменной дробилки Nebula из-за вывода в космос"
  - spellcheck: "Добавлена дополнительная глубокая лорная информация к некоторым пистолетам в игре. Найдите свой любимый и посмотрите, уделил ли я ему внимание"
  - spellcheck: "Переписан лор для контрактных и тазерных дубинок"
  - code_imp: "Изменён путь к Либерейтерам. На их работу это не влияет"
  - code_imp: "Переделана перезарядка Regal Condors с калибров .45 и 10mm Reaper на .45 Reaper. На функционал это не влияет"
  - bugfix: "Несимметричные холсты для рисования и проекты Nanopaint теперь корректно сохраняются в иконки"
  - bugfix: "Больше нельзя вводить пустые имена при сохранении файлов Nanopaint"
  - spellcheck: "Вводимые пользователями имена модульных компьютеров теперь проверяются через IC-фильтр PDA"
  - bugfix: "Исцеляющее прикосновение снова работает"
  - bugfix: "Исправлено отсутствие муки в пролитой муке"
  - bugfix: "Перерезка ID-провода на шлюзе теперь снова блокирует использование ID (вместо смены доступа у двери на все)"
  - bugfix: "челюсти восстановления теперь нельзя крафтить из челюстей восстановления"
  - map: "Ядерные оперативники теперь спаунятся на лифте ядерной базы в начале раунда, а не в самой базе. Это изменение снизило лаг при загрузке базы на старте раунда"
  - balance: "Лианы Лаваленда переработаны из простого спаунера мобов в полноценного маленького босса"
  - balance: "Минимальное расстояние спауна мобов Лаваленда уменьшено с 12 до 7"
  - balance: "Снова можно делать ящики с инструментами из мяса и бумаги"
  - bugfix: "Кибернетические кошачьи уши больше нельзя изменять с помощью flesh reshapers (потому что это их ломало)"
  - bugfix: "Трофеи Bileworm Spewlet больше не стреляют пулями вместо кислотной желчи"