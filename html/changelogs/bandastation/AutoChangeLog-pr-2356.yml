author: "tgstation"
delete-after: True
changes:
  - qol: "(Большинство) стопок теперь не выпадают сразу из мешков, если положить в мешок достаточно для нормального размера стопки."
  - bugfix: "Исправлены ошибки выполнения компонента взрыва."
  - bugfix: "Параллакс-слои больше не перемещаются резко к центру экрана и обратно при смене случайного слоя параллакса."
  - rscadd: "Добавлен помповый гранатомет и соответствующий комплект в uplink ядерного оперативника. Он стреляет гранатами калибра 40 мм."
  - rscadd: "Добавлены зажигательные гранаты калибра 40 мм для поджога объектов."
  - rscadd: "Добавлены гранаты калибра 40 мм с титановыми дробовыми зарядами. Это похоже на картечь, но мощнее."
  - rscadd: "Добавлены гранаты калибра 40 мм с слезоточивым газом. Удушающие И удобные."
  - balance: "Гранатомет каравана заменён на гранатомет с откидным стволом M79. Теперь он поставляется с несколькими гранатами со слезоточивым газом и диском для печати дополнительных (а также резиновыми зарядами калибра 40 мм)."
  - balance: "Резиновый заряд калибра 40 мм сбивает людей с ног, не теряет эффективность против брони, но наносит меньше урона в целом. Также он отскакивает от стен."
  - map: "Добавлена увеличенная версия BYOS."
  - map: "Незакрытые области без воздуха на оригинальных BYOS заменены на те, что с воздухом."
  - bugfix: "Большинство марсианских коктейлей теперь не одного и того же цвета, если их поместить в бутылку."
  - qol: "Смешивание чая/кофе с сахаром даёт небольшой бонус к настроению. Так что попробуйте сделать это."
  - qol: "Astrotame и крем теперь устраняют чувство отвращения."
  - qol: "Смешивание различных типов кофе может лечить повреждения от недостатка кислорода, так как кофе обладает антиоксидантными свойствами."
  - bugfix: "Исправлены уведомления голосования для призраков, в которых отсутствовали фоны."
  - bugfix: "Кровяной червь теперь может воспроизводить одно потомство."
  - spellcheck: "Исправлено несколько опечаток."
  - bugfix: "Секейлеры теперь блокируют перцовый спрей, когда подняты, но не когда опущены."
  - qol: "Клавиши для создания скриншотов теперь отображаются в опциях клавиш вместо кнопок в верхнем левом углу экрана."
  - rscadd: "Ревенанты всегда видимы в зеркальных отражениях, даже в режиме невидимости."
  - rscadd: "Способность \"Defile\" ревенантов теперь разбивает зеркала."
  - qol: "Ревенанты больше не зависают над столами."
  - rscadd: "Гриболюди теперь выделяют безвредные споры после смерти, которые некоторое время будут превращаться в грибы на полу и стенах."
  - balance: "Капканы теперь стали намного более смертоносными и могут вызывать ранения. Организация Space OSHA также выпустила предупреждение, что неуклюжие люди должны избегать их использования после повторяющихся несчастных случаев."
  - qol: "Добавлен поиск в интерфейс GPS."
  - spellcheck: "Молоток и подставка для молотка теперь называются \"gavel\" и \"sound block\"."
  - rscadd: "Добавлено 1/500 шанс, что зерно, использованное для изготовления пиццы в ящике для пиццы, было проклято злым личем."
  - code_imp: "У радиостанций теперь есть возможность заблокировать слот для ключей, хотя ни одна из радиостанций пока не имеет заблокированного слота. Однако сообщайте о любых багах, связанных с невозможностью взлома, установки или удаления ключей радиостанции."
  - rscadd: "Таймер окончания раунда, сообщающий о перезапуске, теперь удалён из панели статистики и отображается на экране в текстовом виде (аналогично Goon)."
  - bugfix: "Пресс для таблеток в системе водоснабжения теперь не сохраняет реагенты и продукты, если общая ёмкость для обоих исчерпана, что предотвращает создание неправильных продуктов (несбалансированные пропорции реагентов) и потребление энергии."
  - qol: "Статус-бар теперь является предпочтением, а не функцией во вкладке OOC, что означает, что вы можете навсегда выключить его, если вам не нравится (или использовать всплывающие подсказки)."
  - bugfix: "Исправлены несоответствия с beebox и предательскими пчелами, не соблюдающими список запрещённых реагентов."
  - balance: "Таблетки из техобслуживания (вариант достижения, который появляется только в технических зонах) теперь могут содержать микробы ксеноморфов и наниты боргов."
  - balance: "Липкие паутины пауков теперь истощают выносливость, когда мобы заходят на клетку с ними."
  - bugfix: "Химическое сканирование таблетки из техобслуживания удаляет её ценность в достижениях."
  - bugfix: "Шаттл грузового отдела больше не может удалять призрачный моб."
  - rscadd: "Пауков теперь можно приручать и использовать для езды. Они питаются мясом мышей, ящериц, ниан, мух и червей и могут быть приручены только в форме паучат или молодняка."
  - code_imp: "Код приручения переписан с использованием TRAIT_TAMED вместо установки индивидуальных переменных на каждом мобе."
  - rscadd: "Каннабис успокаивает агрессивную обезьяну, в конечном итоге делая её временно спокойной (но не миролюбивой!)."
  - rscadd: "Никотин также успокаивает агрессивную обезьяну, хотя медленнее, чем каннабис, и никогда не сделает её полностью спокойной."
  - rscadd: "Алкоголь, напротив, делает обезьяну ещё более агрессивной (но только если она уже разозлена на кого-то)."
  - refactor: "Переписаны раздаточные боты для использования item_interaction."
  - refactor: "Переписаны имплантеры BCI для использования item_interaction."
  - bugfix: "Pun Pun снова стал Pun Pun."
  - refactor: "Переписаны интегральные схемы с использованием item_interaction и screwdriver_act."
  - refactor: "Переведены принтеры/дубликаторы схем на использование item_interaction."
  - refactor: "Переведена конструкция ботов на использование item_interaction."
  - qol: "Теперь способности ревенанта указывают, если они заблокированы, и лучше показывают, если они сейчас доступны."
  - qol: "Ревенанты больше не получают предупреждения о отсутствии гравитации (они всегда её имеют)."
  - refactor: "Рефакторинг способностей ревенанта, сообщайте о любых странностях в их работе."
  - refactor: "Переведены транспортные средства на использование item_interaction/tool_acts."
  - bugfix: "Удалён белый пиксель из анимации воздуха шлюза EA."
  - bugfix: "Удалён белый пиксель из анимации открытия противопожарного шлюза."