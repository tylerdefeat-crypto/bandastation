author: "Voyaker-coder"
delete-after: True
changes:
  - rscadd: "Добавлены новые виды кобур, которые используются как аксессуары для униформы."
  - rscadd: "Новые виды кобур добавлены в аплинк предателя/нюксквада, заказы карго, внесены в крафт-меню при взаимодействии с кожей."
  - rscadd: "Униформа в нижнем слоте одежды теперь изменяет свой вес в зависимости от веса аксессуаров на униформе."
  - rscadd: "Добавлен общий хоткей для хранилищ аксессуаров. По умолчанию - SHIFT+F (меняется в настройках). Кобуры имеют отдельную логику на срабатывание хоткея для выхватывания оружия."
  - balance: "Характеристики новых кобур были изменены по сравнению со старыми для слотов брони/пояса."
  - balance: "Кобура детектива больше не имеет возможность вмещать оружие на все 3 слота - используется только 1."
  - balance: "Кобура предателя из аплинка теперь имеет 1 слот вместо 2."
  - balance: "Количество слотов у кобур ЕРТ/нюксквада было сокращено с 3 до 2."
  - balance: "Изменено снаряжение командира ОБР кода \"ГАММА\"."
  - map: "Заменены старые кобуры на картах - Cyberiad, NebulaStation. На карте CentCom (АКН \"Трурль\") вместо обычной кобуры - добавлена тактическая в кабинете ОСО."