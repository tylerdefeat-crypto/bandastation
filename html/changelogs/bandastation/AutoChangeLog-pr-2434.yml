author: "tgstation"
delete-after: True
changes:
  - bugfix: "Раундстартовые революционеры больше не могут быть назначены в качестве лидеров революции, если игроки этого не хотят."
  - bugfix: "Исправлена ошибка, при которой использование команды администратором для отмены отправки шаттла раскрывало его местоположение."
  - bugfix: "Камеры поста Donk Trading больше не показываются в сетях камер станции."
  - bugfix: "Туалетный бонг теперь работает."
  - balance: "Теперь невозможно применять наручники к щитам."
  - balance: "Для создания портативного повторителя иконоборца требуется изучить его рецепт, книга с которым теперь может появляться в техтоннелях."
  - bugfix: "Пистолет Liberator теперь всегда применяет модификатор урона при стрельбе в упор, независимо от способа выстрела."
  - bugfix: "Одеяния ржавого еретика теперь усиливаются, если тайл под ним становится ржавым."
  - balance: "\"Вознесение в пустоту\" и эффект \"прохлады пустоты\" теперь учитывают антимагию."
  - rscadd: "Аура еретика теперь освещает пространство вокруг него."
  - bugfix: "Исправлен эксплойт, позволявший выйти из фазы пустоты в любой момент через потерю фокуса еретика."
  - bugfix: "Аура лунного вознесения не воздействовала на цели, если у одной из них было более 10 единиц рассудка. Исправлено."
  - bugfix: "Дым больше не подвергает мобов воздействию реагентов несколько раз за тик, что значительно сокращает длительность эффектов химического дыма."
  - qol: "Рудоносные выходы теперь становятся прозрачными и кликабельными, если моб находится на их тайле. Нижняя часть выхода всё ещё кликабельна."
  - code_imp: "Улучшен код рудоносных выходов."
  - rscadd: "Добавлен новый положительный квирк – \"Чуткий нос\". Персонажи с этим квирком могут определять химический состав в открытых мензурках и бутылках, просто осматривая их, держа в руках. Описание запаха идентично описанию вкуса реагентов."
  - rscadd: "Попадание под действие перцового баллончика временно лишает моба обоняния на полминуты."
  - admin: "Ловушки голопаразита теперь логируют моменты установки и срабатывания."
  - rscadd: "Теперь на панели наград гражданской профессии добавлен новый раздел, где игроки могут сотрудничать для выполнения дополнительных общественных наград. Награда делится пропорционально вкладу (минимум от 5 до 10 на старте, в зависимости от численности игроков)."
  - rscadd: "Панель наград гражданской профессии теперь может печатать листы с описанием всех доступных наград, как это было раньше."
  - bugfix: "Функция отправки гражданских наград больше не загружает помещение для удерживания ниндзя."
  - map: "На станции “Tramstation” внутренняя камера суперматерии теперь больше не подключена к АПЦ."
  - bugfix: "Исправлена ошибка, из-за которой случайные порталы при рыбалке не работали корректно."
  - qol: "Способности голопаразита теперь представлены кнопками действий, которые можно переназначить или переместить."
  - qol: "Голопаразиты теперь имеют кнопки изменения положения на полу."
  - bugfix: "Голопаразиты и косы душ теперь имеют индикатор боевого режима."
  - bugfix: "Пронырливым голопаразитам возвращён слот для инвентаря; у не-пронырливых он был удалён (так как они все равно не могли его использовать)."
  - rscadd: "Добавлен новый тактический IFF-визор, доступный после изучения боевых имплантов."
  - refactor: "Немного переработан рендер глаз персонажа."
  - bugfix: "Исправлена ошибка с исчезновением интерфейса ботов."
  - spellcheck: "Обновлены шаги поворота при вскрытии инопланетян, чтобы соответствовать изменениям в процессах хирургии."
  - rscadd: "Добавлена жилетка-свитер."
  - rscadd: "Космический дракон получил способность находить области для создания разломов."
  - sound: "Теперь бритьё Айана не звучит как использование сварочного аппарата."
  - admin: "Администраторы теперь могут более свободно изменять цвета сообщений OOC."
  - rscdel: "Удалены карты snowdin и caves."
  - refactor: "Большинство машин теперь имеют переписанные взаимодействия с отверткой, монтировкой или гаечным ключом; сообщайте об ошибках, например, если нельзя открыть панель или разрушить машину."
  - rscadd: "Получение джекпота на игровом автомате теперь сохраняется в памяти."
  - balance: "Полная память даёт настрой +4 вместо +6, но теперь эффект является постоянным."
  - rscadd: "Потеря больших сумм денег от CRAB-17 вызывает негативный настрой, который перезаписывает эффект джекпота."
  - server: "Оптимизирована работа CI для пропуска проверок карты, если карты не были изменены."
  - rscadd: "Если тело без игрока (например, с статусом \"не возрождать\") превращается в зомби, у привидений появляется возможность контролировать его."
  - rscadd: "Если тело, ранее не управлявшееся игроком, воскрешается как зомби, оно становится более слабым \"безмозглым зомби\" (двигается и восстанавливается медленнее, наносит меньше урона, заражение при ударе не гарантируется)."
  - rscadd: "\"Счетчики стиля\" теперь начисляют очки за добычу руды из рудоносных выходов на основе их богатства и сложности."
  - balance: "Убийства мегафауны и добыча руды дают постоянный бонус к стилю в размере 10% / 5/10/15% (в зависимости от сложности целей)."
  - rscdel: "Баллы за добычу породы без руды больше не начисляются \"счетчиком стиля\"."
  - qol: "Действия для набора \"счетчика стиля\" теперь перечислены сверху вниз, а не снизу вверх."
  - rscadd: "Агенты-предатели, квартирмейстеры и управляющие персоналом теперь могут купить на рынке \"спусковой механизм для встроенного оружия в кейс\" за 4 TC. Кейс позволяет стрелять из любого оружия, которое в него помещено, при активации самого кейса. Размер оружия ограничен пространством кейса, а значит, по большей части подходят лишь пистолеты и некоторые лазеры. У кейса также есть менее заметный признак при осмотре в руках."
  - rscadd: "Комплект за 8 TC включает в себя кейс со встроенным пистолетом Макарова. Механика также доступна как средний приз шпиона."
  - balance: "Признак осмотра шпионского предмета \"ботинок с кинжалом\" теперь виден только при осмотре, держа предмет."
  - bugfix: "Маска кицунэ больше не скрывает личность пользователя, когда её носят, не скрывая лицо."
  - bugfix: "Удалены неработающие жезлы огненного шара и лечения из академии, так как \"неактивный\" означало меньшее количество зарядов, а не отсутствие функционала."
  - bugfix: "Исправлена ошибка, из-за которой спавнеры окон не были плотными, что влияло на границы видимости."
  - bugfix: "Книги больше не обрезаются ниже лимита длины страниц."
  - bugfix: "Книги, созданные с использованием бумаги с множеством вступительных текстов, больше не объединяют весь текст в одну линию."
  - rscadd: "Для рецепта \"Пусс-Кафе\" теперь требуются более экзотические ликеры."
  - qol: "Рецепт коктейля \"Улучшенный виски\" стал проще для ручного приготовления."
  - bugfix: "Стимуляторы теперь корректно восстанавливают выносливость в случае, если человек в остальном здоров."
  - balance: "Удалено минимальное требование на АПЦ для робозаводов."
  - bugfix: "Изменение выбора пола в настройках персонажа больше не затрагивает предпочтение телосложения."
  - bugfix: "Удаление мозга теперь обновляет MedHUD."
  - rscadd: "Добавлено 16 новых волшебных жезлов, которые маги могут купить дешево, но с рандомным выбором, либо получить через вызов магии."
  - rscadd: "Если маг покупает более одного набора жезлов, он получает \"бандольеру для жезлов\", которую можно носить в слоте ранца или на слоте костюма. Эта бандольера автоматически заменяет использованные жезлы на новые."
  - balance: "Посохи и жезлы теперь пытаются одушевлять другие предметы, если цель живая и уже одушевлена."
  - balance: "Одушевление жезла \"ничто\" превращает его в жезл одушевления (и тут же одушевляет)."
  - balance: "Жезл Хаоса теперь обладает расширенным функционалом."
  - balance: "Магикарпы теперь доступны в вариантах \"Бормочущий\", \"Ледяной\", \"Квантовый\" и \"Невесомый\". Собери их всех!"
  - balance: "Больше нельзя скидывать всадников с пони одним кликом. Вместо этого, при толчке пони ИЛИ наездника есть шанс выбросить всадника. Шанс зависит от ряда факторов, таких как выносливость, физический урон и шатание."
  - balance: "Механика \"выбить всадника\" теперь также работает и с ездоками Липпер, но у них вероятность успеха ниже из-за их большей устойчивости."
  - bugfix: "Борги уборщики больше не оставляют кровавых следов при автоматической уборке."
  - bugfix: "Цель еретика по изучению знания больше не занижается на ~8-10 пунктов от требуемого значения."
  - bugfix: "Сварочные защитные очки покрывают глаза только в активированном состоянии."
  - balance: "Кораблик из бутылки можно снова убрать в бутылку с Alt+клик."
  - balance: "Теперь кораблик из бутылки можно запускать, бросая его, и занимает он меньше места в инвентаре (малый предмет, а не нормальный)."
  - spellcheck: "Лодки больше не называют весла \"ключами\"."
  - bugfix: "Предметы, трансформирующиеся, как лазерные мечи, больше не приобретают абсурдные характеристики при многократной переделке."
  - bugfix: "Режим камеры ИИ работает на любых расстояниях."
  - rscadd: "Врата еретика теперь оборудованы 40-мм пушкой."
  - spellcheck: "Исправлены случаи, когда в картах TGC неверно указывалось \"плазма\", а не \"мана\" в стоимости карты."
  - qol: "Федора детектива \"нуар\" теперь официально называется федорой детектива и обладает всеми соответствующими уникальными особенностями."
  - image: "Обновлена текстура \"омега мыла\"."
  - balance: "При успешной жертве еретику все остальные еретики теряют игрока как цель, и больше не могут случайно сделать его своей целью снова."
  - rscadd: "На Лаваленде добавлены 2 новых типа породы: сидерит (богат железом и титаном) и сланец (содержит плазму, золото, уран)."
  - rscadd: "В области хищников форпоста Лаваленда теперь гарантированно появляется река и пруд для рыбалки."
  - rscadd: "Руды теперь появляются в жилках или кластерах и гораздо чаще встречаются рядом с открытыми породами."
  - balance: "Объемы естественного появления руды увеличены и приближены к уровням до появления системы аркмайнинга. Выработка выходов уменьшена наполовину."
  - balance: "Модуль АОЕ для горнодобывающего оружия (PKA) возвращён к размеру 3x3 с добавлением штрафа за использование."
  - balance: "Плазморезы теперь потребляют больше плазмы при зарядке и имеют уменьшенную дальность."
  - balance: "Режим сферы Mining MOD больше не обеспечивает мгновенную добычу, но имеет крайне высокую скорость."
  - balance: "Золотые жуки способны значительно быстрее прокапываться и появляются намного чаще, чем раньше. Их процесс бурения можно прервать, нанеся им урон."
  - balance: "Золотые жуки больше не отражают удары, кроме взрывов и энергетического оружия."
  - balance: "Методы АОЕ-майнинга теперь имеют вероятность 10%/25% не добыть сидерит/слюду, если они не содержат руду."
  - refactor: "Алгоритм генерации Лаваленда был переписан, теперь пещеры будут значительно более разнообразными."
  - balance: "Маги с перком \"Пожиратель сердец\" могут получать усиления только от сердец разумных существ."
  - rscadd: "Для простоты извлечения сердец из разумных существ перк \"Пожиратель сердец\" позволяет вырывать сердце из груди у раненого или умершего существа, если использовать пустую руку и целиться в грудь в боевом режиме."
  - bugfix: "Исправлена одна из ситуаций, при которой игрок мог навсегда застрять на месте, используя комплект Фултона."
  - rscadd: "Добавлены дополнительные предметы для генератора снаряжения антагониста."
  - bugfix: "Исправлена потеря кредитов при правильном отказе от доставки на рынке полезных ископаемых."
  - bugfix: "Материалы с рынка грузового отдела теперь приходят в ящиках, как и ожидалось."